  <text x="744" y="160" font-size="10" font-weight="bold" fill="#C53030">3</text>
  <text x="820" y="160" font-size="9" fill="#C53030">&#x2192; OFD &#x201C;W&#x201D;</text>

  <!-- Child FD 4 → OFD "W" -->
