<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4A5568"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2B6CB0"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B46C1"/>
    </marker>
  </defs>

  <rect width="920" height="520" fill="#FAFBFC" rx="8"/>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1A202C">Figure 1-1: Mô hình 3 bảng của kernel (Three-Table Model)</text>
  <text x="460" y="48" text-anchor="middle" font-size="11" fill="#718096">Nguồn: The Linux Programming Interface, Section 5.4, Figure 5-2</text>

  <!-- ===================== PER-PROCESS FD TABLE ===================== -->
  <rect x="20" y="68" width="240" height="310" fill="#EBF8FF" stroke="#2B6CB0" stroke-width="1.5" rx="6"/>
  <text x="140" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#2B6CB0">Process A — FD Table</text>
  <text x="140" y="108" text-anchor="middle" font-size="10" fill="#4A5568">(per-process file descriptor table)</text>

  <!-- Column headers -->
  <text x="36" y="132" font-size="9" font-weight="bold" fill="#718096">FD</text>
  <text x="80" y="132" font-size="9" font-weight="bold" fill="#718096">CLOEXEC</text>
  <text x="170" y="132" font-size="9" font-weight="bold" fill="#718096">Trỏ đến OFD</text>

  <!-- FD 0 stdin -->
  <rect x="32" y="140" width="216" height="28" fill="#fff" stroke="#CBD5E0" rx="3"/>
  <text x="44" y="158" font-size="10" fill="#4A5568">0</text>
  <text x="100" y="158" font-size="10" fill="#4A5568">—</text>
  <text x="172" y="158" font-size="10" fill="#4A5568">→ (stdin)</text>

  <!-- FD 1 stdout -->
  <rect x="32" y="172" width="216" height="28" fill="#fff" stroke="#CBD5E0" rx="3"/>
  <text x="44" y="190" font-size="10" fill="#4A5568">1</text>
  <text x="100" y="190" font-size="10" fill="#4A5568">—</text>
  <text x="172" y="190" font-size="10" fill="#4A5568">→ (stdout)</text>

  <!-- FD 2 stderr -->
  <rect x="32" y="204" width="216" height="28" fill="#fff" stroke="#CBD5E0" rx="3"/>
  <text x="44" y="222" font-size="10" fill="#4A5568">2</text>
  <text x="100" y="222" font-size="10" fill="#4A5568">—</text>
  <text x="172" y="222" font-size="10" fill="#4A5568">→ (stderr)</text>

  <!-- FD 3: open("/etc/hostname", O_RDONLY) -->
  <rect x="32" y="240" width="216" height="28" fill="#EBF4FF" stroke="#3182CE" rx="3"/>
  <text x="44" y="258" font-size="10" font-weight="bold" fill="#2B6CB0">3</text>
  <text x="100" y="258" font-size="10" fill="#2B6CB0">0</text>
  <text x="172" y="258" font-size="10" font-weight="bold" fill="#2B6CB0">→ OFD #201</text>

  <!-- FD 4: dup(fd3) — same OFD as FD 3 -->
  <rect x="32" y="272" width="216" height="28" fill="#EBF4FF" stroke="#3182CE" rx="3"/>
  <text x="44" y="290" font-size="10" font-weight="bold" fill="#2B6CB0">4</text>
  <text x="100" y="290" font-size="10" fill="#2B6CB0">0</text>
  <text x="172" y="290" font-size="10" font-weight="bold" fill="#2B6CB0">→ OFD #201</text>

  <!-- FD 5: open("/etc/hostname", O_RDWR) — new OFD, same inode -->
  <rect x="32" y="308" width="216" height="28" fill="#F0FFF4" stroke="#38A169" rx="3"/>
  <text x="44" y="326" font-size="10" font-weight="bold" fill="#2F855A">5</text>
  <text x="100" y="326" font-size="10" fill="#2F855A">0</text>
  <text x="172" y="326" font-size="10" font-weight="bold" fill="#2F855A">→ OFD #202</text>

  <!-- FD 6: open("/var/log/app.log", O_WRONLY | O_CLOEXEC) -->
  <rect x="32" y="344" width="216" height="28" fill="#FFF5F5" stroke="#E53E3E" rx="3"/>
  <text x="44" y="362" font-size="10" font-weight="bold" fill="#C53030">6</text>
  <text x="100" y="362" font-size="10" font-weight="bold" fill="#C53030">1</text>
  <text x="172" y="362" font-size="10" font-weight="bold" fill="#C53030">→ OFD #203</text>

  <!-- ===================== OPEN FILE TABLE ===================== -->
  <rect x="330" y="68" width="250" height="310" fill="#FFFBEB" stroke="#D69E2E" stroke-width="1.5" rx="6"/>
  <text x="455" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#B7791F">Open File Table</text>
  <text x="455" y="108" text-anchor="middle" font-size="10" fill="#4A5568">(system-wide, mỗi entry = struct file)</text>

  <!-- OFD #201: shared by FD 3 and FD 4 (dup) -->
  <rect x="342" y="122" width="226" height="78" fill="#EBF4FF" stroke="#3182CE" rx="3"/>
  <text x="354" y="141" font-size="10" font-weight="bold" fill="#2B6CB0">OFD #201</text>
  <text x="354" y="157" font-size="10" fill="#4A5568">f_pos: 0 | O_RDONLY</text>
  <text x="354" y="173" font-size="9" fill="#2B6CB0">f_count: 2 (FD 3 + FD 4 via dup)</text>
  <text x="354" y="189" font-size="9" fill="#718096">→ i-node 45678</text>

  <!-- OFD #202: only FD 5, same inode as #201 -->
  <rect x="342" y="210" width="226" height="78" fill="#F0FFF4" stroke="#38A169" rx="3"/>
  <text x="354" y="229" font-size="10" font-weight="bold" fill="#2F855A">OFD #202</text>
  <text x="354" y="245" font-size="10" fill="#4A5568">f_pos: 300 | O_RDWR</text>
  <text x="354" y="261" font-size="9" fill="#2F855A">f_count: 1 (FD 5)</text>
  <text x="354" y="277" font-size="9" fill="#718096">→ i-node 45678</text>

  <!-- OFD #203: only FD 6, CLOEXEC, different inode -->
  <rect x="342" y="298" width="226" height="78" fill="#FFF5F5" stroke="#E53E3E" rx="3"/>
  <text x="354" y="317" font-size="10" font-weight="bold" fill="#C53030">OFD #203</text>
  <text x="354" y="333" font-size="10" fill="#4A5568">f_pos: 0 | O_WRONLY</text>
  <text x="354" y="349" font-size="9" fill="#C53030">f_count: 1 (FD 6 — CLOEXEC)</text>
  <text x="354" y="365" font-size="9" fill="#718096">→ i-node 67890</text>

  <!-- ===================== I-NODE TABLE ===================== -->
  <rect x="650" y="68" width="250" height="310" fill="#FAF5FF" stroke="#805AD5" stroke-width="1.5" rx="6"/>
  <text x="775" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#6B46C1">i-node Table</text>
  <text x="775" y="108" text-anchor="middle" font-size="10" fill="#4A5568">(per-filesystem, mỗi entry = struct inode)</text>

  <!-- i-node 45678: shared by OFD #201 and #202 -->
  <rect x="662" y="122" width="226" height="92" fill="#EDE9FE" stroke="#D6BCFA" rx="3"/>
  <text x="674" y="141" font-size="10" font-weight="bold" fill="#6B46C1">i-node 45678</text>
  <text x="674" y="157" font-size="10" fill="#4A5568">/etc/hostname</text>
  <text x="674" y="173" font-size="10" fill="#718096">type: regular file</text>
  <text x="674" y="189" font-size="10" fill="#718096">perms: 644 | size: 12B</text>
  <text x="674" y="205" font-size="9" fill="#6B46C1">2 OFD trỏ đến (OFD#201, OFD#202)</text>

  <!-- i-node 67890: only OFD #203 -->
  <rect x="662" y="226" width="226" height="78" fill="#fff" stroke="#D6BCFA" rx="3"/>
  <text x="674" y="245" font-size="10" font-weight="bold" fill="#6B46C1">i-node 67890</text>
  <text x="674" y="261" font-size="10" fill="#4A5568">/var/log/app.log</text>
  <text x="674" y="277" font-size="10" fill="#718096">type: regular file</text>
  <text x="674" y="293" font-size="10" fill="#718096">perms: 640 | size: 8.5K</text>

  <!-- ===================== ARROWS: FD Table -> OFT ===================== -->
  <!-- FD 3 → OFD #201 -->
  <line x1="248" y1="258" x2="339" y2="155" stroke="#2B6CB0" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- FD 4 → OFD #201 (dup — same target) -->
  <line x1="248" y1="290" x2="339" y2="170" stroke="#2B6CB0" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- FD 5 → OFD #202 -->
  <line x1="248" y1="326" x2="339" y2="245" stroke="#2F855A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- FD 6 → OFD #203 -->
  <line x1="248" y1="362" x2="339" y2="333" stroke="#C53030" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ARROWS: OFT -> i-node -->
  <!-- OFD #201 → i-node 45678 -->
  <line x1="568" y1="155" x2="659" y2="165" stroke="#B7791F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- OFD #202 → i-node 45678 (same inode!) -->
  <line x1="568" y1="250" x2="659" y2="185" stroke="#B7791F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- OFD #203 → i-node 67890 -->
  <line x1="568" y1="340" x2="659" y2="265" stroke="#B7791F" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== ANNOTATIONS ===================== -->
  <!-- dup() annotation -->
  <rect x="20" y="388" width="240" height="48" fill="#EBF4FF" stroke="#3182CE" rx="4" stroke-dasharray="4,2"/>
  <text x="140" y="408" text-anchor="middle" font-size="10" font-weight="bold" fill="#2B6CB0">FD 3 và FD 4: dup()</text>
  <text x="140" y="426" text-anchor="middle" font-size="9" fill="#2B6CB0">Cùng OFD → chia sẻ f_pos và f_flags</text>

  <!-- Separate open() annotation -->
  <rect x="330" y="388" width="250" height="48" fill="#F0FFF4" stroke="#38A169" rx="4" stroke-dasharray="4,2"/>
  <text x="455" y="408" text-anchor="middle" font-size="10" font-weight="bold" fill="#2F855A">OFD#201 và OFD#202: hai lần open()</text>
  <text x="455" y="426" text-anchor="middle" font-size="9" fill="#2F855A">Cùng i-node → khác f_pos, đọc/ghi độc lập</text>

  <!-- CLOEXEC annotation -->
  <rect x="650" y="388" width="250" height="48" fill="#FFF5F5" stroke="#E53E3E" rx="4" stroke-dasharray="4,2"/>
  <text x="775" y="408" text-anchor="middle" font-size="10" font-weight="bold" fill="#C53030">FD 6: cờ CLOEXEC = 1</text>
  <text x="775" y="426" text-anchor="middle" font-size="9" fill="#C53030">Sẽ bị đóng tự động khi exec()</text>

  <!-- ===================== CODE MAPPING ===================== -->
  <rect x="20" y="448" width="880" height="64" fill="#F7FAFC" stroke="#E2E8F0" rx="4"/>
  <text x="30" y="468" font-size="9" font-weight="bold" fill="#4A5568">Mã nguồn tạo trạng thái trên:</text>
  <text x="30" y="484" font-size="9" font-family="Consolas, monospace" fill="#2B6CB0">fd3 = open("/etc/hostname", O_RDONLY);        /* → FD 3, OFD#201, inode 45678 */</text>
  <text x="30" y="498" font-size="9" font-family="Consolas, monospace" fill="#2B6CB0">fd4 = dup(fd3);                               /* → FD 4, cùng OFD#201, f_count: 1→2 */</text>
  <text x="510" y="484" font-size="9" font-family="Consolas, monospace" fill="#2F855A">fd5 = open("/etc/hostname", O_RDWR);  /* → FD 5, OFD#202 mới, cùng inode */</text>
  <text x="510" y="498" font-size="9" font-family="Consolas, monospace" fill="#C53030">fd6 = open("/var/log/app.log", O_WRONLY | O_CLOEXEC); /* → FD 6, OFD#203 */</text>
</svg>
