  <text x="480" y="52" text-anchor="middle" font-size="10" fill="#718096">FD 5 (OFD ri&#xEA;ng) ghi XXX t&#x1EA1;i pos 0 &#x2014; &#x111;&#xE8; AAA th&#xE0;nh XXX</text>

